name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: FitMePlus
  DERIVED_DATA: build

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Accept license & first launch
        run: |
          sudo xcodebuild -license accept 2>/dev/null || true
          xcodebuild -runFirstLaunch 2>/dev/null || true

      - name: Install tools
        run: brew install xcodegen imagemagick

      - name: Generate icons from icon.png
        run: |
          chmod +x scripts/generate-icons.sh
          ./scripts/generate-icons.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Download watchOS SDK
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            xcodebuild -downloadPlatform watchOS -quiet 2>&1 && break
            if [ $i -lt 3 ]; then sleep 10; fi
          done

      - name: Build FitMeWatch
        run: |
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "FitMeWatch" \
            -derivedDataPath "$DERIVED_DATA" \
            -destination "generic/platform=watchOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP=$(find "$DERIVED_DATA" -name "FitMeWatch.app" -path "*/Release*" -type d | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          ditto -c -k --keepParent Payload FitMeWatch.ipa
          rm -rf Payload
          ls -lh FitMeWatch.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FitMeWatch-IPA
          path: FitMeWatch.ipa
          compression-level: 0
          if-no-files-found: error