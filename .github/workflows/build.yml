name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: FitMePlus
  SCHEME: FitMeApp
  DERIVED_DATA: build
  ARCHIVE_PATH: build/FitMePlus.xcarchive
  EXPORT_PATH: build/ipa

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Accept license & first launch
        run: |
          sudo xcodebuild -license accept 2>/dev/null || true
          xcodebuild -runFirstLaunch 2>/dev/null || true

      - name: Install tools
        run: brew install xcodegen imagemagick

      - name: Generate icons from icon.png
        run: |
          chmod +x scripts/generate-icons.sh
          ./scripts/generate-icons.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Download iOS SDK (retry up to 3 times)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3 to download iOS SDK..."
            xcodebuild -downloadPlatform iOS -quiet 2>&1 && break
            if [ $i -lt 3 ]; then sleep 10; fi
          done

      - name: Archive FitMeApp
        run: |
          xcodebuild archive \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -derivedDataPath "$DERIVED_DATA" \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            VALIDATE_WATCH_APP_ON_BUILD=NO

      - name: Export IPA
        run: |
          mkdir -p "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FitMePlus-IPA
          path: ${{ env.EXPORT_PATH }}/*.ipa
          compression-level: 0
          if-no-files-found: error