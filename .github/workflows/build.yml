name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: FitMePlus
  DERIVED_DATA: build
  IPA_NAME: FitMePlus

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Accept license & first launch
        run: |
          sudo xcodebuild -license accept 2>/dev/null || true
          xcodebuild -runFirstLaunch 2>/dev/null || true

      - name: Install tools
        run: brew install xcodegen imagemagick

      - name: Generate icons from icon.png
        run: |
          chmod +x scripts/generate-icons.sh
          ./scripts/generate-icons.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Download watchOS SDK
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            xcodebuild -downloadPlatform watchOS -quiet 2>&1 && break
            if [ $i -lt 3 ]; then sleep 10; fi
          done

      - name: Build FitMeApp (iOS)
        run: |
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "FitMeApp" \
            -derivedDataPath "$DERIVED_DATA" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build FitMeWatch (watchOS)
        run: |
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "FitMeWatch" \
            -derivedDataPath "$DERIVED_DATA" \
            -destination "generic/platform=watchOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Embed watch app in iOS app and package IPA
        run: |
          IOS_APP=$(find "$DERIVED_DATA" -name "FitMeApp.app" -path "*/Debug*" -type d | head -1)
          WATCH_APP=$(find "$DERIVED_DATA" -name "FitMeWatch.app" -path "*/Debug*" -type d | head -1)
          echo "iOS app: $IOS_APP"
          echo "Watch app: $WATCH_APP"

          # Embed watch app inside iOS app bundle
          mkdir -p "$IOS_APP/Watch"
          cp -R "$WATCH_APP" "$IOS_APP/Watch/"

          # Strip debug dylibs (preview.dylib, *.debug.dylib) that AltStore rejects
          find "$IOS_APP" -name "*.dylib" -delete
          find "$IOS_APP/Watch/FitMeWatch.app" -name "*.dylib" -delete

          # Add WKWatchKitApp to iOS Info.plist so AltStore recognizes it
          /usr/libexec/PlistBuddy -c "Add :WKWatchKitApp bool true" "$IOS_APP/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :WKWatchKitApp true" "$IOS_APP/Info.plist"

          # Add WKWatchKitApp to watch Info.plist
          /usr/libexec/PlistBuddy -c "Add :WKWatchKitApp bool true" "$IOS_APP/Watch/FitMeWatch.app/Info.plist" 2>/dev/null || true

          # Package IPA
          mkdir -p Payload
          cp -R "$IOS_APP" Payload/
          ditto -c -k --keepParent Payload "${IPA_NAME}.ipa"
          rm -rf Payload
          ls -lh "${IPA_NAME}.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FitMePlus-IPA
          path: FitMePlus.ipa
          compression-level: 0
          if-no-files-found: error
